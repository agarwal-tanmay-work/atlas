databases:
  - name: atlas-db
    databaseName: atlas
    user: atlas
    plan: free

services:
  - type: web
    name: atlas-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: atlas-frontend
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npx serve -s dist -p 10000"
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: atlas-backend
          property: host
        # The frontend will get the host (e.g. atlas-backend.onrender.com) so we prepend https:// in api.js or here.
