databases:
  - name: atlas-db
    databaseName: atlas
    user: atlas
    plan: free

services:
  - type: web
    name: atlas-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: atlas-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: atlas-backend
          property: host
        # The frontend will get the host (e.g. atlas-backend.onrender.com) so we prepend https:// in api.js or here.
